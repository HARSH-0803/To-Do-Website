<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO APP</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div>
        <nav>
            <div>
                <img class="image" src="./Assests/Leaves image - 2.png" alt="leaf image">
            </div>
            <div class="overlay"></div>
            <h1>
                Todo App
            </h1>
        </nav>
    </div>

    <div class="main">
        <div class="tabs">
            <button class="active">Today</button>
            <button>Pending</button>
            <button class="overdue_button">Overdue</button>
        </div>
    </div>
    <div class="task-header">
        <h2>
            Tasks
        </h2>
        <button class="add-btn"> + Add Task</button>
    </div>
    <div class="task">
            <input type="checkbox">
            <span class="taskName">Draft Project Proposal</span>
            <span class="date">Thurs 26 March 2026</span>
            <button class="edit">🖊</button>
            <span class="priority high"></span>
    </div>
    <script src="./script.js"></script>
</body>

</html>
